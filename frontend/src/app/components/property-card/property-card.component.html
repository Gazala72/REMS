<div class="card" style="display: flex; flex-direction: column; height: 100%;" *ngIf="property">
    <div style="position: relative; height: 200px; overflow: hidden;">
        <img [src]="property.images && property.images.length > 0 ? property.images[0] : 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&q=80'"
            [alt]="property.title" style="width: 100%; height: 100%; object-fit: cover;" />
        <div style="position: absolute; top: 10px; right: 10px;">
            <span class="badge" [ngClass]="property.status === 'Available' ? 'badge-success' : 'badge-danger'">
                {{property.status}}
            </span>
        </div>
        <div style="position: absolute; bottom: 10px; left: 10px;">
            <span
                style="background: var(--secondary); color: white; padding: 0.25rem 0.5rem; border-radius: var(--radius-sm); font-weight: 600;">
                ₹{{property.price | number}}
            </span>
        </div>
    </div>

    <div style="padding: 1.5rem; display: flex; flex-direction: column; flex: 1;">
        <h3
            style="margin-bottom: 0.5rem; font-size: 1.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
            {{property.title}}
        </h3>

        <p
            style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.875rem; margin-bottom: 1rem; color: var(--text-secondary);">
            <lucide-icon [img]="MapPinIcon" size="16"></lucide-icon> {{property.location}}
        </p>

        <div
            style="display: flex; justify-content: space-between; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 1rem 0; margin-top: auto; margin-bottom: 1.5rem;">
            <div style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.875rem;">
                <lucide-icon [img]="BedIcon" size="16" color="var(--text-secondary)"></lucide-icon>
                <span>{{property.bedrooms}} Beds</span>
            </div>
            <div style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.875rem;">
                <lucide-icon [img]="BathIcon" size="16" color="var(--text-secondary)"></lucide-icon>
                <span>{{property.bathrooms}} Baths</span>
            </div>
            <div style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.875rem;">
                <lucide-icon [img]="SquareIcon" size="16" color="var(--text-secondary)"></lucide-icon>
                <span>{{property.area}} sqft</span>
            </div>
        </div>

        <a [routerLink]="['/properties', property._id]" class="btn btn-primary"
            style="width: 100%; text-align: center;">
            View Details
        </a>
    </div>
</div>
