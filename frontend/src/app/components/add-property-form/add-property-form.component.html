<div
    style="position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; z-index: 2000;">
    <div class="card animate-fade-in-up"
        style="background: var(--surface); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative;">

        <button (click)="onClose()"
            style="position: absolute; top: 1rem; right: 1rem; background: transparent; border: none; cursor: pointer; color: var(--text-secondary);">
            <lucide-icon [img]="CloseIcon" size="24"></lucide-icon>
        </button>

        <h2 style="margin-bottom: 1.5rem;">Add New Property</h2>

        <div *ngIf="error"
            style="background: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; text-align: center;">
            {{ error }}
        </div>

        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label class="form-label">Property Title *</label>
                <input type="text" name="title" required [(ngModel)]="formData.title" class="form-control"
                    placeholder="Luxury Villa..." />
            </div>

            <div class="form-group">
                <label class="form-label">Description *</label>
                <textarea name="description" required [(ngModel)]="formData.description" class="form-control" rows="3"
                    placeholder="Describe the property..."></textarea>
            </div>

            <div class="grid grid-2" style="margin-bottom: 1.5rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Price (₹) *</label>
                    <input type="number" name="price" required [(ngModel)]="formData.price" class="form-control" />
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Type *</label>
                    <select name="type" required [(ngModel)]="formData.type" class="form-control">
                        <option value="Residential">Residential</option>
                        <option value="Commercial">Commercial</option>
                        <option value="Land">Land</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Location (e.g. City, State) *</label>
                <input type="text" name="location" required [(ngModel)]="formData.location" class="form-control"
                    placeholder="New York, NY" />
            </div>

            <div class="grid grid-3" style="margin-bottom: 1.5rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Area (sqft) *</label>
                    <input type="number" name="area" required [(ngModel)]="formData.area" class="form-control" />
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Bedrooms</label>
                    <input type="number" name="bedrooms" required [(ngModel)]="formData.bedrooms"
                        class="form-control" />
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Bathrooms</label>
                    <input type="number" name="bathrooms" required [(ngModel)]="formData.bathrooms"
                        class="form-control" />
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Amenities (Comma separated)</label>
                <input type="text" name="amenities" [(ngModel)]="formData.amenities" class="form-control"
                    placeholder="Pool, Gym, Balcony..." />
            </div>

            <div class="form-group">
                <label class="form-label">Upload Image (Optional)</label>
                <input type="file" name="imageFile" (change)="onFileSelected($event)" class="form-control"
                    accept="image/*" />
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="button" class="btn btn-secondary" (click)="onClose()" style="flex: 1;">Cancel</button>
                <button type="submit" class="btn btn-primary" [disabled]="loading" style="flex: 1;">
                    {{ loading ? 'Saving...' : 'Add Property' }}
                </button>
            </div>
        </form>
    </div>
</div>
