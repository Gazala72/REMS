<nav
    style="position: fixed; top: 0; width: 100%; background-color: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; height: 70px; display: flex; align-items: center;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <a routerLink="/"
            style="display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 1.25rem; color: var(--primary);">
            <lucide-icon [img]="HomeIcon" class="text-secondary"></lucide-icon> REMS
        </a>

        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <a routerLink="/properties" style="font-weight: 500; color: var(--text-secondary);">Properties</a>

            <ng-container *ngIf="authService.user$ | async as user; else guestLinks">
                <a *ngIf="user.role === 'admin'" routerLink="/admin/dashboard" style="font-weight: 500;">Admin Board</a>
                <a *ngIf="user.role !== 'admin'" routerLink="/dashboard" style="font-weight: 500;">Dashboard</a>

                <div style="display: flex; align-items: center; gap: 1rem;">
                    <span style="font-size: 0.875rem; color: var(--text-secondary);">{{ user.name }}</span>
                    <button (click)="logout()" class="btn btn-secondary" style="padding: 0.5rem 1rem;">
                        <lucide-icon [img]="LogOutIcon" size="16"></lucide-icon> Logout
                    </button>
                </div>
            </ng-container>

            <ng-template #guestLinks>
                <div style="display: flex; gap: 1rem;">
                    <a routerLink="/login" class="btn btn-secondary">Login</a>
                    <a routerLink="/register" class="btn btn-primary">Sign Up</a>
                </div>
            </ng-template>
        </div>
    </div>
</nav>
