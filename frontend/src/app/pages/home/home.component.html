<div>
    <!-- Hero Section -->
    <section
        style="background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&q=80'); background-size: cover; background-position: center; color: white; padding: 100px 0; text-align: center;">
        <div class="container">
            <h1 style="margin-bottom: 1rem; font-size: 3rem; font-weight: 800;">Find Your Dream Home Today</h1>
            <p style="font-size: 1.25rem; margin-bottom: 3rem; color: #cbd5e1;">Discover the perfect property from our
                extensive collection of premium real estate.</p>

            <div
                style="background: white; padding: 1rem; border-radius: var(--radius-lg); display: inline-flex; gap: 1rem; align-items: center; box-shadow: var(--shadow-lg); flex-wrap: wrap; justify-content: center;">
                <div
                    style="display: flex; align-items: center; gap: 0.5rem; border-right: 1px solid var(--border); padding-right: 1rem;">
                    <lucide-icon [img]="SearchIcon" color="var(--secondary)" size="20"></lucide-icon>
                    <input type="text" placeholder="Keyword..." [(ngModel)]="keyword"
                        style="border: none; outline: none; background: transparent; color: black;" />
                </div>
                <div
                    style="display: flex; align-items: center; gap: 0.5rem; border-right: 1px solid var(--border); padding-right: 1rem;">
                    <lucide-icon [img]="MapPinIcon" color="var(--secondary)" size="20"></lucide-icon>
                    <input type="text" placeholder="Location..." [(ngModel)]="location"
                        style="border: none; outline: none; background: transparent; color: black;" />
                </div>
                <div
                    style="display: flex; align-items: center; gap: 0.5rem; border-right: 1px solid var(--border); padding-right: 1rem;">
                    <lucide-icon [img]="HomeIcon" color="var(--secondary)" size="20"></lucide-icon>
                    <select [(ngModel)]="type"
                        style="border: none; outline: none; background: transparent; color: black;">
                        <option value="">Property Type</option>
                        <option value="Residential">Residential</option>
                        <option value="Commercial">Commercial</option>
                        <option value="Land">Land</option>
                    </select>
                </div>
                <button (click)="onSearch()" class="btn btn-primary">
                    <lucide-icon [img]="SearchIcon" size="18"></lucide-icon> Search
                </button>
            </div>
        </div>
    </section>

    <!-- Featured Properties -->
    <section style="padding: 80px 0;">
        <div class="container">
            <h2 style="text-align: center; margin-bottom: 3rem;">Featured Properties</h2>

            <div *ngIf="loading" style="text-align: center;">Loading...</div>

            <div *ngIf="!loading" class="grid grid-3">
                <app-property-card *ngFor="let property of properties" [property]="property"></app-property-card>
            </div>

            <div style="text-align: center; margin-top: 3rem;">
                <a routerLink="/properties" class="btn btn-secondary">View All Properties</a>
            </div>
        </div>
    </section>
</div>
