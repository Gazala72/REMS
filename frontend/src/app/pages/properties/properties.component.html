<div class="container" style="padding: 40px 1.5rem; display: flex; gap: 30px;">
    <!-- Sidebar Filters -->
    <div style="width: 300px; flex-shrink: 0;">
        <div
            style="background: var(--surface); padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border); position: sticky; top: 90px;">
            <h3 style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                <lucide-icon [img]="FilterIcon" size="20"></lucide-icon> Filters
            </h3>
            <form (submit)="applyFilters($event)">
                <div class="form-group">
                    <label class="form-label">Keyword</label>
                    <input type="text" name="keyword" [(ngModel)]="filters.keyword" class="form-control"
                        placeholder="Search..." />
                </div>
                <div class="form-group">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" [(ngModel)]="filters.location" class="form-control"
                        placeholder="City or area..." />
                </div>
                <div class="form-group">
                    <label class="form-label">Property Type</label>
                    <select name="type" [(ngModel)]="filters.type" class="form-control">
                        <option value="">Any</option>
                        <option value="Residential">Residential</option>
                        <option value="Commercial">Commercial</option>
                        <option value="Land">Land</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label class="form-label">Min Price</label>
                        <input type="number" name="minPrice" [(ngModel)]="filters.minPrice" class="form-control"
                            placeholder="0" />
                    </div>
                    <div style="flex: 1;">
                        <label class="form-label">Max Price</label>
                        <input type="number" name="maxPrice" [(ngModel)]="filters.maxPrice" class="form-control"
                            placeholder="Any" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Bedrooms</label>
                    <select name="bedrooms" [(ngModel)]="filters.bedrooms" class="form-control">
                        <option value="">Any</option>
                        <option value="1">1+</option>
                        <option value="2">2+</option>
                        <option value="3">3+</option>
                        <option value="4">4+</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Sort By</label>
                    <select name="sort" [(ngModel)]="filters.sort" class="form-control">
                        <option value="recent">Newest</option>
                        <option value="price_asc">Price (Low to High)</option>
                        <option value="price_desc">Price (High to Low)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Apply Filters</button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div style="flex: 1;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>Available Properties</h2>
            <span style="color: var(--text-secondary);">Showing {{properties.length}} results</span>
        </div>

        <div *ngIf="loading">Loading...</div>

        <div *ngIf="!loading && properties.length === 0"
            style="text-align: center; padding: 3rem; background: var(--surface); border-radius: var(--radius-lg);">
            <h3>No properties found</h3>
            <p>Try adjusting your search filters.</p>
        </div>

        <div *ngIf="!loading && properties.length > 0" class="grid grid-2">
            <app-property-card *ngFor="let property of properties" [property]="property"></app-property-card>
        </div>
    </div>
</div>
