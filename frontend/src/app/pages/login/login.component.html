<div class="container"
    style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 70px);">
    <div
        style="background: var(--surface); padding: 2.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 400px;">
        <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>

        <div *ngIf="error"
            style="background: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; text-align: center;">
            {{ error }}
        </div>

        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" required [(ngModel)]="email" name="email" class="form-control"
                    placeholder="john@example.com" />
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" required [(ngModel)]="password" name="password" class="form-control"
                    placeholder="••••••••" />
            </div>
            <button type="submit" class="btn btn-primary"
                style="width: 100%; margin-top: 1rem; padding: 0.875rem;">Login</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
            Don't have an account? <a routerLink="/register" style="color: var(--secondary); font-weight: 500;">Sign
                Up</a>
        </p>
    </div>
</div>
